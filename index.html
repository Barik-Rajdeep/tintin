<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tintin </title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#020409,#07152d,#0f2c5a);
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* romantic title */

.title{
text-align:center;
font-size:38px;
margin-top:30px;
font-family:'Noto Serif Bengali';
color:#8ed6ff;
letter-spacing:2px;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #3ea6ff;}
to{ text-shadow:0 0 25px #6ecbff;}
}

/* center photo */

.profile{
width:220px;
height:220px;
border-radius:50%;
overflow:hidden;
margin:40px auto;
border:6px solid #69c2ff;
box-shadow:0 0 40px #3ea6ff;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* love text */

.love-text{
max-width:650px;
margin:auto;
font-size:18px;
line-height:1.7;
color:#d9ecff;
text-align:center;
padding:20px;
font-family:'Noto Serif Bengali';
min-height:140px;
}

/* floating photo frames */

.bg img{
position:absolute;
width:120px;
opacity:0.2;
border-radius:10px;
animation:float 10s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* slideshow */

.slideshow{
width:500px;
margin:40px auto;
position:relative;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:12px;
box-shadow:0 0 25px #958138;
}

.active{
display:block;
animation:fade 1.2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.slide-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
border:none;
color:white;
font-size:24px;
padding:10px 14px;
cursor:pointer;
border-radius:8px;
}

.prev{left:-60px;}
.next{right:-60px;}

/* PLAYER */

.player{
width:430px;
margin:50px auto;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
box-shadow:0 0 40px #0a84ff;
}

.song-title{
text-align:center;
font-size:18px;
margin-bottom:10px;
color:#7ecbff;
}

/* progress bar */

.seek{
width:100%;
appearance:none;
height:6px;
border-radius:10px;
background:#2c3e50;
cursor:pointer;
}

.seek::-webkit-slider-thumb{
appearance:none;
width:14px;
height:14px;
background:#0a84ff;
border-radius:50%;
}

/* time */

.time{
display:flex;
justify-content:space-between;
font-size:12px;
color:#bbb;
}

/* controls */

.controls{
display:flex;
justify-content:center;
gap:20px;
margin:15px 0;
}

.controls button{
background:#0a84ff;
border:none;
padding:12px 16px;
border-radius:50%;
font-size:18px;
color:white;
cursor:pointer;
transition:0.3s;
}

.controls button:hover{
background:#3ea6ff;
transform:scale(1.15);
}

/* volume */

.volume{
width:90px;
margin:auto;
display:block;
appearance:none;
height:4px;
background:#2c3e50;
border-radius:10px;
cursor:pointer;
}

.volume::-webkit-slider-thumb{
appearance:none;
width:12px;
height:12px;
background:#0a84ff;
border-radius:50%;
}

/* falling hearts */

.heart{
position:fixed;
color:#ff4d6d;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}


/* stars background */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* shooting star */

.shooting-star{
position:fixed;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 6px white,0 0 12px white;
animation:shoot 2s linear forwards;
}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:1;
}

100%{
transform:translate(-400px,400px);
opacity:0;
}

}

/* moon */

.moon{
position:fixed;
top:60px;
right:80px;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #ffffff9e, #dfe9f39e, #b8c6dba2);
box-shadow:
0 0 40px #cce7ff,
0 0 80px #9ed0ff,
0 0 120px rgba(158,208,255,0.5);
z-index:-1;
}

/* moon craters */

.moon::before,
.moon::after{
content:"";
position:absolute;
border-radius:50%;
background:rgba(0,0,0,0.1);
}

.moon::before{
width:20px;
height:20px;
top:30px;
left:35px;
}

.moon::after{
width:14px;
height:14px;
top:70px;
left:70px;
}

/* cursor star effect */

.cursor-star{
position:fixed;
width:8px;
height:8px;
background:#8ed6ff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 10px #8ed6ff,0 0 20px #3ea6ff;
animation:cursorFade 0.8s linear forwards;
}

@keyframes cursorFade{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(0);
opacity:0;
}
}

/* live love calendar */

.love-calendar{
width:420px;
margin:60px auto;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
box-shadow:0 0 40px #3ea6ff;
text-align:center;
}

.calendar-header{
font-size:20px;
color:#8ed6ff;
margin-bottom:15px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
padding:10px;
border-radius:8px;
background:#0f2c5a;
font-size:13px;
}

.today{
background:#0a84ff;
color:white;
font-weight:bold;
box-shadow:0 0 10px #0a84ff;
}

.anniversary{
background:#ff4d6d;
color:white;
font-weight:bold;
animation:loveGlow 1.5s infinite alternate;
}

@keyframes loveGlow{
from{box-shadow:0 0 10px #ff4d6d}
to{box-shadow:0 0 25px #ff4d6d}
}

/* events */

.events{
margin-top:20px;
text-align:left;
font-size:14px;
}

.event{
padding:8px;
margin-top:6px;
background:#07152d;
border-radius:6px;
}

.event strong{
color:#ff4d6d;
}

</style>
</head>

<body>

<div class="bg">
<img src="bg1.jpeg" style="top:10%;left:5%">
<img src="bg2.jpeg" style="top:30%;left:80%">
<img src="bg3.jpeg" style="top:70%;left:10%">
<img src="bg4.jpeg" style="top:60%;left:85%">
</div>
<div class="moon"></div>
<div class="profile">
<img src="tintin.jpeg">
</div>

<div class="love-text" id="typing"></div>

<!-- slideshow -->

<div class="slideshow">

<div class="slide active">
<img src="tintin2.jpeg">
</div>

<div class="slide">
<img src="tintin3.jpeg">
</div>

<div class="slide">
<img src="tintin4.jpg">
</div>

<button class="slide-btn prev" onclick="prevSlide()">❮</button>
<button class="slide-btn next" onclick="nextSlide()">❯</button>

</div>

<!-- PLAYER -->

<div class="player">

<div class="song-title" id="title">Song</div>

<audio id="audio"></audio>

<input type="range" id="seek" class="seek" value="0">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="playPause()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<input type="range" id="volume" class="volume" min="0" max="1" step="0.01">

</div>

<div class="love-calendar">

<div class="calendar-title">Our Love Calendar – June 2025 ❤️</div>

<div class="calendar-header" id="monthYear"></div>

<div class="calendar-grid" id="calendarDays"></div>

<div class="events">
<div><strong>Upcoming Love Events ❤️</strong></div>

<div class="event">9 June – Our Anniversary 💞</div>

<div class="event">1st Date Memory Day ☕</div>

</div>
<div class="calendar-grid">

<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>
<div class="day">4</div>
<div class="day">5</div>
<div class="day">6</div>
<div class="day">7</div>

<div class="day">8</div>
<div class="day anniversary">9 ❤️</div>
<div class="day">10</div>
<div class="day">11</div>
<div class="day">12</div>
<div class="day">13</div>
<div class="day">14</div>

<div class="day">15</div>
<div class="day">16</div>
<div class="day">17</div>
<div class="day">18</div>
<div class="day">19</div>
<div class="day">20</div>
<div class="day">21</div>

<div class="day">22</div>
<div class="day">23</div>
<div class="day">24</div>
<div class="day">25</div>
<div class="day">26</div>
<div class="day">27</div>
<div class="day">28</div>

<div class="day">29</div>
<div class="day">30</div>

</div>

<div class="love-counter">
We have been together for
<div class="days-together" id="daysTogether">0</div>
days ❤️
</div>

</div>

<script>

/* typing love letter */

let text=`Tintin,
I miss you, I love you😘
 With me or without me, go chase your dreams
become the best version of you, get everything
you deserve, I want you to win everything.
Become the person you told me you wanted
to be I wil always be proud of you!! ❤️`

let i=0
let speed=60

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(type,speed)
}
}
type()

/* songs */

let songs=[
{title:"Calcium",src:"Anjan_Dutt_-_Calcium_(mp3.pm).mp3"},
{title:"Bohukal",src:"bohukal.m4a"},
{title:"Kaahe Mose",src:"Kaahe Mose.mp3"}
]

let index=0
let audio=document.getElementById("audio")
let title=document.getElementById("title")
let seek=document.getElementById("seek")
let volume=document.getElementById("volume")
let current=document.getElementById("current")
let duration=document.getElementById("duration")

function loadSong(i){
audio.src=songs[i].src
title.innerText=songs[i].title
}

loadSong(index)

function playPause(){
if(audio.paused){
audio.play()
}else{
audio.pause()
}
}

function nextSong(){
index=(index+1)%songs.length
loadSong(index)
audio.play()
}

function prevSong(){
index=(index-1+songs.length)%songs.length
loadSong(index)
audio.play()
}

/* format time */

function formatTime(sec){
let m=Math.floor(sec/60)
let s=Math.floor(sec%60)
if(s<10)s="0"+s
return m+":"+s
}

audio.addEventListener("loadedmetadata",()=>{
duration.innerText=formatTime(audio.duration)
})

audio.addEventListener("timeupdate",()=>{

seek.value=(audio.currentTime/audio.duration)*100

current.innerText=formatTime(audio.currentTime)

})

seek.addEventListener("input",()=>{
audio.currentTime=(seek.value/100)*audio.duration
})

volume.addEventListener("input",()=>{
audio.volume=volume.value
})

/* slideshow */

let slides=document.querySelectorAll(".slide")
let slideIndex=0

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"))
slides[i].classList.add("active")
}

function nextSlide(){
slideIndex=(slideIndex+1)%slides.length
showSlide(slideIndex)
}

function prevSlide(){
slideIndex=(slideIndex-1+slides.length)%slides.length
showSlide(slideIndex)
}

setInterval(nextSlide,4000)

/* falling hearts */

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(createHeart,800)

/* create many stars */

for(let i=0;i<150;i++){

let star=document.createElement("div")
star.className="star"

star.style.top=Math.random()*100+"vh"
star.style.left=Math.random()*100+"vw"

document.body.appendChild(star)

}

/* shooting stars */

function createShootingStar(){

let star=document.createElement("div")
star.className="shooting-star"

star.style.top=Math.random()*50+"vh"
star.style.left=Math.random()*100+"vw"

document.body.appendChild(star)

setTimeout(()=>{
star.remove()
},2000)

}

setInterval(createShootingStar,2500)


/* cursor animation */

document.addEventListener("mousemove",function(e){

let star=document.createElement("div")
star.className="cursor-star"

star.style.left=e.clientX+"px"
star.style.top=e.clientY+"px"

document.body.appendChild(star)

setTimeout(()=>{
star.remove()
},800)

})
/* love counter */

let startDate=new Date("June 9, 2025")
let today=new Date()

let diff=today-startDate

let days=Math.floor(diff/(1000*60*60*24))

document.getElementById("daysTogether").innerText=days
/* dynamic calendar */

const calendarDays=document.getElementById("calendarDays")
const monthYear=document.getElementById("monthYear")

let now=new Date()

let year=now.getFullYear()
let month=now.getMonth()

let firstDay=new Date(year,month,1).getDay()
let totalDays=new Date(year,month+1,0).getDate()

let months=["January","February","March","April","May","June","July","August","September","October","November","December"]

monthYear.innerText=months[month]+" "+year

for(let i=0;i<firstDay;i++){
let empty=document.createElement("div")
calendarDays.appendChild(empty)
}

for(let d=1;d<=totalDays;d++){

let day=document.createElement("div")
day.className="day"
day.innerText=d

/* today highlight */

if(
d===now.getDate() &&
month===now.getMonth() &&
year===now.getFullYear()
){
day.classList.add("today")
}

/* anniversary highlight */

if(d===9 && month===5){
day.classList.add("anniversary")
}

calendarDays.appendChild(day)

}


</script>

</body>
</html>
